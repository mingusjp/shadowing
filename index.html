<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Shadowing</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;
  --border:#2e2e2e;--text:#e8e8e8;--muted:#666;--dim:#3a3a3a;
  --red:#e05555;--green:#4caf7d;--amber:#d4943a;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem}
.container{width:100%;max-width:560px}
header{margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.title{font-family:var(--mono);font-size:12px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
h1{font-size:26px;font-weight:300;letter-spacing:-.02em}
h1 span{color:var(--red)}
.status{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .2s}
.dot.waiting-voice{background:var(--amber);animation:blink 1.5s infinite}
.dot.recording{background:var(--red);animation:blink .8s infinite}
.dot.playing{background:var(--green);animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.status-info{flex:1}
.status-main{font-size:14px;font-weight:500}
.status-sub{font-size:12px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.countdown{font-family:var(--mono);font-size:13px;color:var(--amber);min-width:32px;text-align:right}
.waveform{height:72px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;gap:2px;padding:0 14px;margin-bottom:1rem;overflow:hidden}
.bar{width:3px;border-radius:2px;background:var(--dim);min-height:3px;transition:height .04s}
.bar.rec{background:var(--red)}
.bar.play{background:var(--green)}
.bar.wait{background:var(--amber)}
.controls{display:flex;gap:8px;margin-bottom:1.25rem}
button{flex:1;padding:10px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s,border-color .15s}
button:hover:not(:disabled){background:var(--bg3);border-color:var(--dim)}
button:disabled{opacity:.35;cursor:not-allowed}
button.danger{border-color:#4a2020;color:var(--red)}
button.danger:hover:not(:disabled){background:#1e1414}
.settings{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1rem 1.25rem}
.setting-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.setting-row:last-child{margin-bottom:0}
.setting-label{font-size:12px;color:var(--muted);min-width:160px;font-family:var(--mono)}
.setting-val{font-size:12px;font-family:var(--mono);color:var(--text);min-width:38px;text-align:right}
input[type=range]{flex:1;-webkit-appearance:none;height:2px;background:var(--dim);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text);cursor:pointer}
.icon{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">voice training tool</div>
    <h1>Voice <span>Shadowing</span></h1>
  </header>

  <div class="status">
    <div class="dot" id="dot"></div>
    <div class="status-info">
      <div class="status-main" id="status-main">Press start to begin</div>
      <div class="status-sub" id="status-sub">records on voice, plays back on silence</div>
    </div>
    <div class="countdown" id="countdown"></div>
  </div>

  <div class="waveform" id="waveform"></div>

  <div class="controls">
    <button id="btn-start" onclick="startSession()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      Start
    </button>
    <button id="btn-stop" class="danger" onclick="stopSession()" disabled>
      <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      Stop
    </button>
  </div>

  <div class="settings">
    <div class="setting-row">
      <span class="setting-label">voice threshold</span>
      <input type="range" min="2" max="40" step="2" value="40" id="voiceThresh"
        oninput="document.getElementById('voiceThreshVal').textContent=this.value">
      <span class="setting-val" id="voiceThreshVal">40</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">silence to play back (s)</span>
      <input type="range" min="0.5" max="3" step="0.5" value="1.0" id="silenceDelay"
        oninput="document.getElementById('silenceVal').textContent=parseFloat(this.value).toFixed(1)+'s'">
      <span class="setting-val" id="silenceVal">1.0s</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">rest after playback (s)</span>
      <input type="range" min="0" max="3" step="0.5" value="0" id="afterDelay"
        oninput="document.getElementById('afterVal').textContent=parseFloat(this.value).toFixed(1)+'s'">
      <span class="setting-val" id="afterVal">0.0s</span>
    </div>
  </div>
</div>

<script>
const BARS = 44;
const waveEl = document.getElementById('waveform');
for(let i=0;i<BARS;i++){const b=document.createElement('div');b.className='bar';b.style.height='3px';waveEl.appendChild(b);}
const bars = Array.from(waveEl.querySelectorAll('.bar'));

let audioCtx, analyser, stream, mediaRecorder;
let chunks=[], preChunks=[];
let state='idle';
let silenceTimer=null, animFrame=null;
let loopActive=false;

function setStatus(main, sub, dotCls, cd=''){
  document.getElementById('status-main').textContent = main;
  document.getElementById('status-sub').textContent  = sub;
  document.getElementById('countdown').textContent   = cd;
  document.getElementById('dot').className = 'dot '+(dotCls||'');
}

function flatBars(cls=''){
  bars.forEach(b=>{ b.style.height='3px'; b.className='bar'+(cls?' '+cls:''); });
}

function getAvg(){
  const data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);
  let sum = 0;
  for(let i = 0; i < data.length; i++){ const v = data[i] - 128; sum += v * v; }
  return Math.sqrt(sum / data.length);
}

async function startSession(){
  if(!navigator.mediaDevices || !window.MediaRecorder){
    setStatus('Not supported','please update your browser','');
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') await audioCtx.resume();
    // Unlock AudioContext for iOS — must play a silent buffer on the first user gesture
    const unlock = audioCtx.createBuffer(1,1,audioCtx.sampleRate);
    const unlockSrc = audioCtx.createBufferSource();
    unlockSrc.buffer = unlock;
    unlockSrc.connect(audioCtx.destination);
    unlockSrc.start(0);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled  = false;
    loopActive = true;
    waitForVoice();
  } catch(e) {
    setStatus('Microphone unavailable','please allow microphone access','');
  }
}

function makeMimeType(){
  return ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg;codecs=opus','audio/ogg']
    .find(m => MediaRecorder.isTypeSupported(m)) || '';
}

function waitForVoice(){
  if(!loopActive) return;
  state = 'waiting-voice';
  setStatus('Listening...','start speaking to record','waiting-voice');
  flatBars('wait');

  // Pre-roll: record continuously and keep only the last ~300ms of chunks
  preChunks = [];
  const mimeType = makeMimeType();
  mediaRecorder = mimeType ? new MediaRecorder(stream,{mimeType}) : new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => {
    if(e.data && e.data.size>0){
      preChunks.push(e.data);
      if(preChunks.length > 6) preChunks.shift(); // keep ~300ms window
    }
  };
  mediaRecorder.start(50);

  const thresh = parseFloat(document.getElementById('voiceThresh').value);
  function check(){
    if(!loopActive || state!=='waiting-voice') return;
    if(getAvg() >= thresh){ startRecording(); return; }
    silenceTimer = setTimeout(check, 40);
  }
  check();
}

function startRecording(){
  if(!loopActive) return;
  state = 'recording';
  setStatus('Recording...','go silent to play back','recording');
  // Seed chunks with pre-roll so the first word isn't lost
  chunks = [...preChunks];
  preChunks = [];
  mediaRecorder.ondataavailable = e => { if(e.data && e.data.size>0) chunks.push(e.data); };
  animRecord();
  watchSilence();
}

function animRecord(){
  const data = new Uint8Array(analyser.fftSize);
  function frame(){
    if(state!=='recording') return;
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for(let i = 0; i < data.length; i++){ const v = data[i]-128; sum += v*v; }
    const avg = Math.sqrt(sum/data.length);
    bars.forEach((b,i)=>{
      const v = Math.abs(data[Math.floor(i*data.length/BARS)] - 128);
      b.style.height = Math.max(3,Math.round(v/128*58))+'px';
      b.className = 'bar'+(avg>8?' rec':'');
    });
    animFrame = requestAnimationFrame(frame);
  }
  frame();
}

function watchSilence(){
  const threshold = parseFloat(document.getElementById('silenceDelay').value)*1000;
  const thresh = parseFloat(document.getElementById('voiceThresh').value);
  let silentMs=0, last=Date.now();
  function tick(){
    if(!loopActive || state!=='recording') return;
    const now=Date.now(), dt=now-last; last=now;
    silentMs = getAvg() < thresh ? silentMs+dt : 0;
    const rem = Math.max(0, threshold-silentMs);
    document.getElementById('countdown').textContent = (silentMs>300&&rem>0) ? (rem/1000).toFixed(1)+'s' : '';
    if(silentMs>=threshold && chunks.length>0){ triggerPlayback(); return; }
    silenceTimer = setTimeout(tick, 40);
  }
  tick();
}

function triggerPlayback(){
  if(!loopActive) return;
  state = 'playing';
  clearTimeout(silenceTimer);
  cancelAnimationFrame(animFrame);
  document.getElementById('countdown').textContent = '';
  mediaRecorder.stop();
  mediaRecorder.onstop = async () => {
    if(!loopActive) return;
    const mimeType = chunks[0]?.type || 'audio/webm';
    const blob = new Blob(chunks, {type: mimeType});
    if(blob.size < 500){ afterPlay(); return; }
    setStatus('Playing back...','listen to yourself','playing');
    flatBars('play');

    let done = false;
    const next = () => { if(!done){ done = true; afterPlay(); } };

    try {
      if(audioCtx.state==='suspended') await audioCtx.resume();
      const arrayBuf = await blob.arrayBuffer();
      const decoded  = await audioCtx.decodeAudioData(arrayBuf);
      const src = audioCtx.createBufferSource();
      src.buffer = decoded;
      src.connect(audioCtx.destination);
      src.start(0);
      src.onended = next;
    } catch(err) {
      console.warn('decodeAudioData failed, fallback:', err);
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => { URL.revokeObjectURL(url); next(); };
      audio.onerror  = () => { URL.revokeObjectURL(url); next(); };
      audio.play().catch(next);
    }
  };
}

function afterPlay(){
  if(!loopActive) return;
  const wait = parseFloat(document.getElementById('afterDelay').value)*1000;
  setStatus('Preparing...','listening again soon','');
  flatBars();
  setTimeout(()=>{ if(loopActive) waitForVoice(); }, wait);
}

function stopSession(){
  loopActive = false;
  state = 'idle';
  clearTimeout(silenceTimer);
  cancelAnimationFrame(animFrame);
  if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  if(stream) stream.getTracks().forEach(t=>t.stop());
  if(audioCtx && audioCtx.state!=='closed') audioCtx.close();
  flatBars();
  setStatus('Stopped','press start to continue','');
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled  = true;
}
</script>
</body>
</html>
